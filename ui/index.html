<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Transform Lite</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
        <div class="app-container">
            <div class="sidebar">
                <div class="sidebar-section">
                    <h2 class="sidebar-title">Mis Recetas</h2>
                    <div id="presets-list" class="presets-list">
                        <!-- Presets injected by JS -->
                    </div>
                    <div class="presets-actions">
                        <button id="btn-add-preset" class="btn-preset-act" title="Nueva Receta">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                            Nueva
                        </button>
                        <button id="menu-load-preset" class="btn-preset-act" title="Importar Preset JSON">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                            Importar
                        </button>
                        <button id="menu-save-preset" class="btn-preset-act" title="Exportar Preset JSON">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                            Exportar
                        </button>
                    </div>
                </div>

                <div class="sidebar-section">
                    <h2 class="sidebar-title">Configuración</h2>
                    <div class="sidebar-menu">
                        <button id="btn-reset" class="btn-preset-action">Restablecer Todo</button>
                        <button id="menu-check-updates" class="btn-preset-action">Buscar Actualizaciones</button>
                        <button id="menu-about" class="btn-preset-action">Acerca de</button>
                    </div>
                </div>
            </div>

            <div class="main-content">
                <!-- Update banner -->
                <div id="update-banner" class="update-banner" style="display:none;">
                    <span id="update-msg"></span>
                    <a id="update-link" href="#" target="_blank">Descargar</a>
                    <button id="update-dismiss" class="update-dismiss">&times;</button>
                </div>

                <header class="header">
                    <h1>Image Transform Lite <span id="app-version" class="version-badge"></span></h1>
                </header>


            <!-- Directories -->
            <section class="section">
                <h2>Directorios</h2>
                <div class="dir-row">
                    <label>Input:</label>
                    <input type="text" id="input-dir" readonly>
                    <button id="btn-input-dir" class="btn-sm">Examinar</button>
                </div>
                <div class="dir-row">
                    <label>Output:</label>
                    <input type="text" id="output-dir" readonly>
                    <button id="btn-output-dir" class="btn-sm">Examinar</button>
                </div>
                <div class="file-count" id="file-count">Buscando imágenes...</div>
            </section>

            <!-- Preview Section -->
            <section class="section preview-section" id="preview-section" style="display:none;">
                <h2>Previsualización</h2>
                <div class="preview-container">
                    <div class="preview-box">
                        <span class="preview-label">Original</span>
                        <img id="preview-orig" src="" alt="Original">
                    </div>
                    <div class="preview-box">
                        <span class="preview-label">Resultado</span>
                        <img id="preview-res" src="" alt="Resultado">
                    </div>
                </div>
                <div class="preview-nav" id="preview-nav" style="display:none;">
                    <button id="btn-prev-img" class="btn-nav">&lsaquo;</button>
                    <span id="preview-index-text" class="nav-text">Imagen 1 de 1</span>
                    <button id="btn-next-img" class="btn-nav">&rsaquo;</button>
                </div>
                <div class="preview-info" id="preview-info">Imagen: <span class="preview-filename" id="preview-filename" data-tooltip="">...</span></div>
            </section>

            <!-- Transforms -->
            <section class="section">
                <h2>Transformaciones <span class="hint">(arrastra para reordenar)</span></h2>
                <div id="transforms-list" class="transforms-list">
                    <!-- Cards injected by JS -->
                </div>
            </section>

            <!-- Output Settings -->
            <section class="section">
                <h2>Configuración de salida</h2>
                <div class="output-row">
                    <label>Formato:</label>
                    <select id="output-format" class="input-sm" style="width:80px;">
                        <option value="webp">WebP</option>
                        <option value="jpeg">JPEG</option>
                        <option value="png">PNG</option>
                        <option value="tiff">TIFF</option>
                    </select>
                    <label style="margin-left:20px;">Calidad:</label>
                    <input type="number" id="output-quality" min="1" max="100" value="90" class="input-sm">
                </div>
            </section>

            <!-- Progress -->
            <section class="section" id="progress-section" style="display:none;">
                <div class="progress-bar-container">
                    <div class="progress-bar" id="progress-bar"></div>
                </div>

                <div class="progress-text" id="progress-text"></div>
            </section>

            <!-- Actions -->
            <section class="section actions">
                <button id="btn-process" class="btn-primary">Procesar Imágenes</button>
                <button id="btn-open-output" class="btn-secondary">Abrir Carpeta Output</button>
            </section>


        </div>
    </div>

    <!-- Save preset dialog -->
    <div id="save-preset-overlay" class="modal-overlay" style="display:none;">
        <div class="modal">
            <h3 class="modal-heading">Guardar Receta</h3>
            <input type="text" id="save-preset-name" class="save-preset-input" placeholder="Nombre de la receta">
            <div class="modal-actions">
                <button id="save-preset-cancel" class="btn-cancel">Cancelar</button>
                <button id="save-preset-confirm" class="modal-close">Guardar</button>
            </div>
        </div>
    </div>

    <!-- Modal dialog -->
    <div id="modal-overlay" class="modal-overlay" style="display:none;">
        <div class="modal">
            <div class="modal-body" id="modal-body"></div>
            <button class="modal-close" id="modal-close">OK</button>
        </div>
    </div>

    <!-- Update progress overlay -->
    <div id="update-progress-overlay" class="modal-overlay" style="display:none;">
        <div class="modal update-progress-content">
            <div class="update-icon">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
                    <polyline points="7 10 12 15 17 10"/>
                    <line x1="12" y1="15" x2="12" y2="3"/>
                </svg>
            </div>
            <div class="update-title">Descargando actualización</div>
            <div class="progress-bar-container" style="margin:16px 0;">
                <div class="progress-bar" id="update-progress-bar" style="width:0%"></div>
            </div>
            <div id="update-progress-text" class="progress-text" style="text-align:center;">Descargando...</div>
        </div>
    </div>

    <!-- Toast container -->

    <script src="lib/Sortable.min.js"></script>
    <script src="toast.js"></script>
    <script src="app.js"></script>
</body>
</html>
