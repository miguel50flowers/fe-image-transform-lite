name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller pytest

      - name: Run tests
        run: python -m pytest tests/ -v

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Verify version matches code
        run: |
          CODE_VERSION=$(python -c "exec(open('app/version.py').read()); print(__version__)")
          TAG_VERSION="${{ steps.version.outputs.VERSION }}"
          if [ "$CODE_VERSION" != "$TAG_VERSION" ]; then
            echo "ERROR: Tag version ($TAG_VERSION) does not match code version ($CODE_VERSION)"
            exit 1
          fi

      - name: Build .app
        run: pyinstaller build.spec --clean --noconfirm

      - name: Create .zip artifact
        run: |
          cd dist
          zip -r "Image-Transform-Lite-${{ steps.version.outputs.VERSION }}-arm64.zip" "Image Transform Lite.app"

      - name: Create .pkg installer
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          PKG_NAME="Image-Transform-Lite-${VERSION}-arm64.pkg"

          # Create staging directory with Applications target
          mkdir -p pkg-root/Applications
          cp -R "dist/Image Transform Lite.app" "pkg-root/Applications/"

          # Build the .pkg
          pkgbuild \
            --root pkg-root \
            --identifier com.fiftyflowers.imagetransformlite \
            --version "$VERSION" \
            --install-location / \
            "dist/${PKG_NAME}"

      - name: Extract changelog for this version
        id: changelog
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          python3 -c "
          import re, sys
          text = open('CHANGELOG.md').read()
          pattern = r'## \[' + re.escape('$VERSION') + r'\].*?\n(.*?)(?=\n## \[|\Z)'
          m = re.search(pattern, text, re.DOTALL)
          notes = m.group(1).strip() if m else 'Release v$VERSION'
          print(notes)
          " > /tmp/release_notes.txt
          printf '\n---\n\n' >> /tmp/release_notes.txt
          printf '### Instalacion (recomendado)\n' >> /tmp/release_notes.txt
          printf '1. Descargar \`Image-Transform-Lite-%s-arm64.pkg\`\n' "$VERSION" >> /tmp/release_notes.txt
          printf '2. Doble click para instalar\n' >> /tmp/release_notes.txt
          printf '3. Se instala automaticamente en \`/Applications\`\n' >> /tmp/release_notes.txt
          printf '4. Primera vez: click derecho -> Abrir (macOS Gatekeeper)\n\n' >> /tmp/release_notes.txt
          printf '### Alternativa (manual)\n' >> /tmp/release_notes.txt
          printf '1. Descargar \`Image-Transform-Lite-%s-arm64.zip\`\n' "$VERSION" >> /tmp/release_notes.txt
          printf '2. Descomprimir y mover \`Image Transform Lite.app\` a Aplicaciones\n\n' >> /tmp/release_notes.txt
          printf '**Plataforma:** macOS Apple Silicon (arm64)\n' >> /tmp/release_notes.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Image Transform Lite v${{ steps.version.outputs.VERSION }}"
          body_path: /tmp/release_notes.txt
          files: |
            dist/Image-Transform-Lite-${{ steps.version.outputs.VERSION }}-arm64.pkg
            dist/Image-Transform-Lite-${{ steps.version.outputs.VERSION }}-arm64.zip
          draft: false
          prerelease: false
